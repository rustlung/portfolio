<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portfolio{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/styles.css') }}">
</head>
<body>
    <!-- Shared site header used by both public pages and admin templates. -->
    <header class="site-header">
        <div class="site-shell site-header__inner">
            <a class="site-logo" href="/">Vadim Sigaev</a>

            <!-- Main navigation intentionally stays compact: portfolio, projects, product and admin access. -->
            <nav class="site-nav" aria-label="Основная навигация">
                <a href="/">Главная</a>
                <a href="/projects">Проекты</a>
                <a href="https://vsigaev.ru/documind">DocuMind</a>
                <a href="/admin">Админка</a>
            </nav>
        </div>
    </header>

    <!-- Each child template injects its own page content into this block. -->
    <main class="site-main">
        <div class="site-shell">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Simple shared footer to keep every page visually consistent. -->
    <footer class="site-footer">
        <div class="site-shell">
            Python Backend Developer. FastAPI, integrations, automation, AI-powered tools.
        </div>
    </footer>
</body>
</html>
